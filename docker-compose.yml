# Setup Server Stack (Traefik 3.6, Registry + Registry auth, Portainer, Watchtower, Semaphore, Gitea, Doku, Duplicati, gocron, Kuma, Beszel, Filebrowser, NGINX static site).
# Optional DBs and DB UIs: use COMPOSE_PROFILES or `docker compose --profile <name>`.
# Run: sudo bash setup-server-stack.sh — writes $STACK_ROOT/.env.stack for docker compose.
# All persistent data lives under $STACK_ROOT/<service> (bind mounts), so one folder = full backup.

name: setup-server-stack

networks:
  proxynet:
    external: true
    name: proxynet

services:
  traefik:
    profiles: [traefik]
    image: ${TRAEFIK_IMAGE:-traefik:v3.6}
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${TRAEFIK_ACME_STORAGE_FILE:-${STACK_ROOT}/traefik/acme.json}:/letsencrypt/acme.json
      - ${STACK_ROOT}/config/traefik/htpasswd:/etc/traefik/htpasswd:ro
      - ${STACK_ROOT}/config/traefik/htpasswd-doku:/etc/traefik/htpasswd-doku:ro
      - ${STACK_ROOT}/config/traefik/provided-certificates.yml:/etc/traefik/dynamic/provided-certificates.yml:ro
      - ${STACK_ROOT}/certs:/certs:ro
    command:
      - --log.level=INFO
      - --api.dashboard=true
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxynet
      - --providers.file.filename=/etc/traefik/dynamic/provided-certificates.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:-${ACME_EMAIL}}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.caserver=${TRAEFIK_ACME_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)
      - traefik.http.routers.traefik-dashboard.entrypoints=websecure
      - traefik.http.routers.traefik-dashboard.tls=true
      - traefik.http.routers.traefik-dashboard.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.routers.traefik-dashboard.service=api@internal
      - traefik.http.routers.traefik-dashboard.middlewares=traefik-dashboard-auth@docker
      - traefik.http.middlewares.traefik-dashboard-auth.basicauth.usersfile=/etc/traefik/htpasswd
      - traefik.http.middlewares.doku-auth.basicauth.usersfile=/etc/traefik/htpasswd-doku
      - com.centurylinklabs.watchtower.enable=false
    networks:
      - proxynet

  registry:
    profiles: [registry]
    image: ${REGISTRY_IMAGE:-registry:2}
    container_name: registry
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      REGISTRY_AUTH: token
      REGISTRY_AUTH_TOKEN_REALM: https://registry-auth.${DOMAIN}/auth
      REGISTRY_AUTH_TOKEN_SERVICE: registry.${DOMAIN}
      REGISTRY_AUTH_TOKEN_ISSUER: ${REGISTRY_AUTH_TOKEN_ISSUER}
      REGISTRY_AUTH_TOKEN_ROOTCERTBUNDLE: /certs/registry-token.pem
    volumes:
      - ${REGISTRY_DATA_PATH:-${STACK_ROOT}/registry}:/var/lib/registry
      - ${STACK_ROOT}/certs/registry-token.pem:/certs/registry-token.pem:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.registry.rule=Host(`registry.${DOMAIN}`)
      - traefik.http.routers.registry.entrypoints=websecure
      - traefik.http.routers.registry.tls=true
      - traefik.http.routers.registry.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.registry.loadbalancer.server.port=5000
    networks:
      - proxynet

  registry-auth:
    profiles: [registry-auth]
    image: ${DOCKER_AUTH_IMAGE:-cesanta/docker_auth:1}
    container_name: registry-auth
    restart: unless-stopped
    command: /config/auth_config.yml
    volumes:
      - ${STACK_ROOT}/config/docker_auth/auth_config.yml:/config/auth_config.yml:ro
      - ${STACK_ROOT}/certs/registry-token.pem:/ssl/registry-token.pem:ro
      - ${STACK_ROOT}/certs/registry-token-key.pem:/ssl/registry-token-key.pem:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.registry-auth.rule=Host(`registry-auth.${DOMAIN}`)
      - traefik.http.routers.registry-auth.entrypoints=websecure
      - traefik.http.routers.registry-auth.tls=true
      - traefik.http.routers.registry-auth.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.registry-auth.loadbalancer.server.port=5001
    networks:
      - proxynet

  portainer:
    profiles: [portainer]
    image: ${PORTAINER_IMAGE:-portainer/portainer-ce:latest}
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${PORTAINER_DATA_PATH:-${STACK_ROOT}/portainer}:/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)
      - traefik.http.routers.portainer.entrypoints=websecure
      - traefik.http.routers.portainer.tls=true
      - traefik.http.routers.portainer.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.portainer.loadbalancer.server.port=9000
    networks:
      - proxynet

  watchtower:
    profiles: [watchtower]
    image: ${WATCHTOWER_IMAGE:-nickfedor/watchtower:latest}
    container_name: watchtower
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_SCHEDULE: ${WATCHTOWER_SCHEDULE:-0 0 4 * * *}
      DOCKER_CONFIG: /config/docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${STACK_ROOT}/config/docker:/config/docker:ro
    networks:
      - proxynet

  semaphore:
    profiles: [semaphore]
    image: ${SEMAPHORE_IMAGE:-semaphoreui/semaphore:latest}
    container_name: semaphore
    restart: unless-stopped
    environment:
      SEMAPHORE_DB_DIALECT: sqlite
      SEMAPHORE_DB: /var/lib/semaphore/semaphore.sqlite
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: ${SEMAPHORE_ACCESS_KEY_ENCRYPTION:-}
      SEMAPHORE_ADMIN: ${SEMAPHORE_ADMIN:-admin}
      SEMAPHORE_ADMIN_PASSWORD: ${SEMAPHORE_ADMIN_PASSWORD:-}
      SEMAPHORE_ADMIN_NAME: ${SEMAPHORE_ADMIN_NAME:-Admin}
      SEMAPHORE_ADMIN_EMAIL: ${SEMAPHORE_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - ${SEMAPHORE_DATA_PATH:-${STACK_ROOT}/semaphore}:/var/lib/semaphore
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.semaphore.rule=Host(`semaphore.${DOMAIN}`)
      - traefik.http.routers.semaphore.entrypoints=websecure
      - traefik.http.routers.semaphore.tls=true
      - traefik.http.routers.semaphore.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.semaphore.loadbalancer.server.port=3000
    networks:
      - proxynet

  # Gitea — self-hosted Git + Issues; Actions enabled. Web UI via Traefik; git+ssh on
  # host port ${GITEA_SSH_PORT} (UFW opened by installer). SQLite by default under ${GITEA_DATA_PATH}.
  gitea:
    profiles: [gitea]
    image: ${GITEA_IMAGE:-gitea/gitea:1.23}
    container_name: gitea
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      USER_UID: ${GITEA_PUID:-1000}
      USER_GID: ${GITEA_PGID:-1000}
      TZ: ${TZ:-UTC}
      GITEA__server__DOMAIN: ${GITEA_HOST:-gitea.${DOMAIN}}
      GITEA__server__SSH_DOMAIN: ${GITEA_HOST:-gitea.${DOMAIN}}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-https://gitea.${DOMAIN}/}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-2222}
      GITEA__server__SSH_LISTEN_PORT: 22
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__actions__ENABLED: "true"
      GITEA__database__DB_TYPE: ${GITEA_DB_TYPE:-sqlite3}
    ports:
      - "${GITEA_SSH_PORT:-2222}:22"
    volumes:
      - ${GITEA_DATA_PATH:-${STACK_ROOT}/gitea}:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.gitea.rule=Host(`${GITEA_HOST:-gitea.${DOMAIN}}`)
      - traefik.http.routers.gitea.entrypoints=websecure
      - traefik.http.routers.gitea.tls=true
      - traefik.http.routers.gitea.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.gitea.loadbalancer.server.port=3000
    networks:
      - proxynet

  # Gitea Actions runner — registers with the hub (installer or GITEA_RUNNER_REGISTRATION_TOKEN).
  # Docker socket is required so workflow jobs can build and run containers.
  gitea-runner:
    profiles: [gitea-runner]
    image: ${GITEA_RUNNER_IMAGE:-gitea/act_runner:0.2.11}
    container_name: gitea-runner
    restart: unless-stopped
    depends_on:
      - gitea
    environment:
      CONFIG_FILE: /data/config.yaml
      GITEA_INSTANCE_URL: ${GITEA_RUNNER_INSTANCE_URL:-https://gitea.${DOMAIN}}
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_REGISTRATION_TOKEN:-}
      GITEA_RUNNER_NAME: ${GITEA_RUNNER_NAME:-stack-runner}
    volumes:
      - ${GITEA_RUNNER_DATA_PATH:-${STACK_ROOT}/gitea-runner}:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - proxynet

  doku:
    profiles: [doku]
    image: ${DOKU_IMAGE:-amerkurev/doku:latest}
    container_name: doku
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.doku.rule=Host(`doku.${DOMAIN}`)
      - traefik.http.routers.doku.entrypoints=websecure
      - traefik.http.routers.doku.tls=true
      - traefik.http.routers.doku.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.routers.doku.middlewares=doku-auth@docker
      - traefik.http.services.doku.loadbalancer.server.port=9090
    networks:
      - proxynet

  # gocron — cron scheduler + web UI; config.yaml (software + jobs) under ${GOCRON_DATA_PATH}.
  # Stack data is mounted read-only at /source/stack for rsync/restic/rclone jobs.
  gocron:
    profiles: [gocron]
    image: ${GOCRON_IMAGE:-ghcr.io/flohoss/gocron:latest}
    container_name: gocron
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ${GOCRON_DATA_PATH:-${STACK_ROOT}/gocron}:/app/config
      - ${STACK_ROOT}:/source/stack:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.gocron.rule=Host(`gocron.${DOMAIN}`)
      - traefik.http.routers.gocron.entrypoints=websecure
      - traefik.http.routers.gocron.tls=true
      - traefik.http.routers.gocron.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.gocron.loadbalancer.server.port=8156
    networks:
      - proxynet

  # Duplicati — backup UI only; job sources/destinations are configured in the web UI.
  # All stack data lives under ${STACK_ROOT}, so one read-only mount backs up everything:
  #   - ${STACK_ROOT}:/source/stack:ro
  duplicati:
    profiles: [duplicati]
    image: ${DUPLICATI_IMAGE:-linuxserver/duplicati:latest}
    container_name: duplicati
    restart: unless-stopped
    environment:
      PUID: ${DUP_PUID:-1000}
      PGID: ${DUP_PGID:-1000}
      TZ: ${TZ:-UTC}
      SETTINGS_ENCRYPTION_KEY: ${DUPLICATI_SETTINGS_ENCRYPTION_KEY:-}
      DUPLICATI__WEBSERVICE_PASSWORD: ${DUPLICATI_WEBSERVICE_PASSWORD:-}
    volumes:
      - ${DUPLICATI_DATA_PATH:-${STACK_ROOT}/duplicati}:/config
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.duplicati.rule=Host(`duplicati.${DOMAIN}`)
      - traefik.http.routers.duplicati.entrypoints=websecure
      - traefik.http.routers.duplicati.tls=true
      - traefik.http.routers.duplicati.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.duplicati.loadbalancer.server.port=8200
    networks:
      - proxynet

  uptime-kuma:
    profiles: [kuma]
    image: ${UPTIME_KUMA_IMAGE:-louislam/uptime-kuma:1}
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - ${KUMA_DATA_PATH:-${STACK_ROOT}/kuma}:/app/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.kuma.rule=Host(`kuma.${DOMAIN}`)
      - traefik.http.routers.kuma.entrypoints=websecure
      - traefik.http.routers.kuma.tls=true
      - traefik.http.routers.kuma.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.kuma.loadbalancer.server.port=3001
    networks:
      - proxynet

  # Beszel — lightweight server monitoring hub (web UI). Image: https://hub.docker.com/r/henrygd/beszel
  # The hub is published on loopback (127.0.0.1) only so the installer and the
  # host-network agent can reach the API locally; public access is via Traefik.
  beszel:
    profiles: [beszel]
    image: ${BESZEL_IMAGE:-henrygd/beszel:latest}
    container_name: beszel
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      APP_URL: ${BESZEL_APP_URL:-https://beszel.${DOMAIN}}
      TZ: ${TZ:-UTC}
      USER_EMAIL: ${BESZEL_USER_EMAIL:-}
      USER_PASSWORD: ${BESZEL_USER_PASSWORD:-}
    ports:
      - "127.0.0.1:${BESZEL_HUB_LOCAL_PORT:-8090}:8090"
    volumes:
      - ${BESZEL_DATA_PATH:-${STACK_ROOT}/beszel}:/beszel_data
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.beszel.rule=Host(`beszel.${DOMAIN}`)
      - traefik.http.routers.beszel.entrypoints=websecure
      - traefik.http.routers.beszel.tls=true
      - traefik.http.routers.beszel.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.beszel.loadbalancer.server.port=8090
    networks:
      - proxynet

  # Beszel agent — monitors the host it runs on and self-registers with the local
  # hub over WebSocket (no inbound port; DISABLE_SSH=true). KEY/TOKEN are written
  # by the installer (configure_beszel) into the agent data dir as files.
  beszel-agent:
    profiles: [beszel-agent]
    image: ${BESZEL_AGENT_IMAGE:-henrygd/beszel-agent:latest}
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    environment:
      HUB_URL: ${BESZEL_HUB_URL:-http://localhost:${BESZEL_HUB_LOCAL_PORT:-8090}}
      DISABLE_SSH: ${BESZEL_AGENT_DISABLE_SSH:-true}
      SYSTEM_NAME: ${BESZEL_SYSTEM_NAME:-}
      DATA_DIR: /beszel_agent_data
      KEY_FILE: /beszel_agent_data/agent.key
      TOKEN_FILE: /beszel_agent_data/agent.token
    volumes:
      - ${BESZEL_AGENT_DATA_PATH:-${STACK_ROOT}/beszel-agent}:/beszel_agent_data
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # File Browser — web file manager; image: https://hub.docker.com/r/filebrowser/filebrowser
  filebrowser:
    profiles: [filebrowser]
    image: ${FILEBROWSER_IMAGE:-filebrowser/filebrowser:v2-s6}
    container_name: filebrowser
    restart: unless-stopped
    environment:
      PUID: ${FILEBROWSER_PUID:-0}
      PGID: ${FILEBROWSER_PGID:-0}
    volumes:
      - ${FILEBROWSER_ROOT_PATH:-/opt}:/srv
      - ${STACK_ROOT}/filebrowser/database:/database
      - ${STACK_ROOT}/filebrowser/config:/config
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.filebrowser.rule=Host(`filebrowser.${DOMAIN}`)
      - traefik.http.routers.filebrowser.entrypoints=websecure
      - traefik.http.routers.filebrowser.tls=true
      - traefik.http.routers.filebrowser.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.filebrowser.loadbalancer.server.port=80
    networks:
      - proxynet

  nginx:
    profiles: [nginx]
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: nginx-static
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${STACK_ROOT}/nginx/public:/usr/share/nginx/html:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.nginx-static.rule=Host(`${NGINX_HOST:-${DOMAIN}}`)
      - traefik.http.routers.nginx-static.entrypoints=websecure
      - traefik.http.routers.nginx-static.tls=true
      - traefik.http.routers.nginx-static.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.nginx-static.loadbalancer.server.port=80
    networks:
      - proxynet

  deployer:
    profiles: [deployer]
    image: ${DEPLOYER_IMAGE_EFFECTIVE:-${DEPLOYER_IMAGE:-ghcr.io/commercedeployer/deployer:latest}}
    container_name: deployer
    restart: unless-stopped
    user: root
    environment:
      NODE_ENV: ${DEPLOYER_NODE_ENV:-production}
      ADMIN_USER: ${DEPLOYER_ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${DEPLOYER_ADMIN_PASSWORD:-}
      DEPLOYER_SECRET: ${DEPLOYER_SECRET:-}
      DEPLOYER_PUBLIC_BASE_URL: ${DEPLOYER_PUBLIC_BASE_URL:-https://deployer.${DOMAIN}}
      DEPLOYER_AUTH_MODE: ${DEPLOYER_AUTH_MODE:-dual}
      PORT: 3000
      DEPLOY_BASE_PATH: ${DEPLOY_BASE_PATH:-/opt/deploy-data}
      TEMPLATES_DIR: /app/templates
      DEFAULT_PULL_POLICY: ${DEPLOYER_DEFAULT_PULL_POLICY:-always}
      PULL_MAX_ATTEMPTS: ${DEPLOYER_PULL_MAX_ATTEMPTS:-3}
      CONTAINER_LIMIT: ${DEPLOYER_CONTAINER_LIMIT:-0}
      MANAGED_LABEL: ${DEPLOYER_MANAGED_LABEL:-managed-by}
      MANAGED_LABEL_VALUE: ${DEPLOYER_MANAGED_LABEL_VALUE:-deployer}
      REGISTRY_HOST: ${DEPLOYER_REGISTRY_HOST:-}
      REGISTRY_USER: ${REGISTRY_USER:-}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD:-}
      REGISTRY_CREDENTIALS_JSON: ${DEPLOYER_REGISTRY_CREDENTIALS_JSON:-}
      API_KEY: ${DEPLOYER_API_KEY:-}
      DEPLOYER_SOFTWARE: ${DEPLOYER_SOFTWARE:-bash,curl,psql}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DEPLOY_BASE_PATH:-/opt/deploy-data}:${DEPLOY_BASE_PATH:-/opt/deploy-data}
      - ${DEPLOY_BASE_PATH:-/opt/deploy-data}/templates:/app/templates
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.deployer.rule=Host(`deployer.${DOMAIN}`)
      - traefik.http.routers.deployer.entrypoints=websecure
      - traefik.http.routers.deployer.tls=true
      - traefik.http.routers.deployer.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.deployer.loadbalancer.server.port=3000
    networks:
      - proxynet

  mongo:
    profiles: [mongo]
    image: ${MONGO_IMAGE:-mongo:7}
    container_name: mongo
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-mongoadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-}
    volumes:
      - ${MONGO_DATA_PATH:-${STACK_ROOT}/mongo}:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand(''ping'').ok" | grep -q 1',
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    labels:
      - com.centurylinklabs.watchtower.enable=false
    networks:
      - proxynet

  postgres:
    profiles: [postgres]
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - ${POSTGRES_DATA_PATH:-${STACK_ROOT}/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$${POSTGRES_DB:-postgres}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - com.centurylinklabs.watchtower.enable=false
    networks:
      - proxynet

  mariadb:
    profiles: [mariadb]
    image: ${MARIADB_IMAGE:-mariadb:11}
    container_name: mariadb
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-}
      MARIADB_USER: ${MARIADB_USER:-}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-}
    volumes:
      - ${MARIADB_DATA_PATH:-${STACK_ROOT}/mariadb}:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    labels:
      - com.centurylinklabs.watchtower.enable=false
    networks:
      - proxynet

  mysql:
    profiles: [mysql]
    image: ${MYSQL_IMAGE:-mysql:8}
    container_name: mysql
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      MYSQL_USER: ${MYSQL_USER:-}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-}
    volumes:
      - ${MYSQL_DATA_PATH:-${STACK_ROOT}/mysql}:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    labels:
      - com.centurylinklabs.watchtower.enable=false
    networks:
      - proxynet

  mongo-express:
    profiles: [mongo-express]
    image: ${MONGO_EXPRESS_IMAGE:-mongo-express:latest}
    container_name: mongo-express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-mongoadmin}:${MONGO_ROOT_PASSWORD:-}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-mexpress}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-}
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.mongo-express.rule=Host(`mongo-express.${DOMAIN}`)
      - traefik.http.routers.mongo-express.entrypoints=websecure
      - traefik.http.routers.mongo-express.tls=true
      - traefik.http.routers.mongo-express.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.mongo-express.loadbalancer.server.port=8081
    networks:
      - proxynet

  pgadmin:
    profiles: [pgadmin]
    image: ${PGADMIN_IMAGE:-dpage/pgadmin4:latest}
    container_name: pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-pgadmin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGPASS_FILE: /pgpass
    volumes:
      - ${PGADMIN_DATA_PATH:-${STACK_ROOT}/pgadmin}:/var/lib/pgadmin
      - ${STACK_ROOT}/config/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ${STACK_ROOT}/config/pgadmin/pgpass:/pgpass:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.pgadmin.rule=Host(`pgadmin.${DOMAIN}`)
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.tls=true
      - traefik.http.routers.pgadmin.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.pgadmin.loadbalancer.server.port=80
    networks:
      - proxynet

  adminer:
    profiles: [adminer]
    image: ${ADMINER_IMAGE:-adminer:latest}
    container_name: adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mariadb:
        condition: service_healthy
        required: false
      mysql:
        condition: service_healthy
        required: false
    environment:
      ADMINER_DEFAULT_SERVER: ${ADMINER_DEFAULT_SERVER:-}
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxynet
      - traefik.http.routers.adminer.rule=Host(`adminer.${DOMAIN}`)
      - traefik.http.routers.adminer.entrypoints=websecure
      - traefik.http.routers.adminer.tls=true
      - traefik.http.routers.adminer.tls.certresolver=${TRAEFIK_CERT_RESOLVER-letsencrypt}
      - traefik.http.services.adminer.loadbalancer.server.port=8080
    networks:
      - proxynet
